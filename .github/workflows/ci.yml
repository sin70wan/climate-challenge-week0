@"
name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'task-*', 'eda-*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python version
      run: python --version
    
    - name: Check pandas installation
      run: python -c "import pandas; print(f'pandas version: {pandas.__version__}')"
    
    - name: Basic validation
      run: python -c "print('CI pipeline works!')"
"@ | Out-File -FilePath .github\workflows\ci.yml -Encoding UTF8